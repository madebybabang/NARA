<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NARA Music</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

</head>

<body
  class="
    bg-[#09090B]
    overflow-hidden
    font-['Inter']
  "
>

  <main
    class="
      relative
      h-[100dvh]
      overflow-hidden
      bg-[#09090B]
    "
  >

    <!-- Content -->
    <section
      class="
        relative
        z-10
        flex
        h-full
        flex-col
        items-center
        pt-[64px]

        min-[390px]:pt-[72px]
        min-[412px]:pt-[80px]
      "
    >
    
      <!-- Icon -->
      <img
        src="/images/logo/LOGO.png"
        alt="NARA Icon"
        class="
          w-[156.14px]
          object-contain
          scale-[2]

          min-[390px]:scale-[2.05]
          min-[412px]:scale-[2.1]
        "
      >

      <!-- Logo -->
      <img
        src="/images/logo/Logo-Teks-NARA.png"
        alt="NARA Music"
        class="
          mt-[64px]
          w-[224px]
          scale-[1.2]
          object-contain

          min-[390px]:mt-[60px]
          min-[390px]:scale-[1.25]

          min-[412px]:scale-[1.3]
        "
      >

      <!-- Tagline -->
      <div
        class="
          mt-[64px]
          text-center

          min-[390px]:mt-[60px]
          min-[412px]:mt-[64px]
        "
      >

        <h2
          class="
            text-[18px]
            font-medium
            text-[#7C3AED]

            min-[390px]:text-[20px]
            min-[412px]:text-[22px]
          "
        >
          Music. Identity. Community.
        </h2>

        <p
          class="
            mt-[2px]
            text-[18px]
            font-medium
            text-[#A1A1AA]

            min-[390px]:text-[20px]
            min-[412px]:text-[22px]
          "
        >
          All in one place
        </p>

      </div>

      <!-- Flexible Space -->
      <div class="flex-1"></div>

      <!-- Loading -->
      <div
        class="
          mb-[64px]

          min-[390px]:mb-[72px]
          min-[412px]:mb-[80px]
        "
      >

        <div
          class="
            relative
            h-[5px]
            w-[156px]
            overflow-hidden
            rounded-full
            bg-[#2A2A3A]
          "
        >

          <div
            class="
              absolute
              left-0
              top-0
              h-full
              w-[42px]
              rounded-full
              bg-[#7C3AED]
            "
          ></div>

        </div>

      </div>

    </section>

  </main>

</body>

</html>
