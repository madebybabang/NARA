<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NARA Music</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

</head>

<body
  class="
    bg-[#09090B]
    overflow-hidden
    font-['Inter']
  "
>

  <main
    class="
      relative
      h-dvh
      overflow-hidden
      bg-[#09090B]
    "
  >

    <section
      class="
        flex
        h-full
        flex-col
        items-center
      "
    >

      <!-- Hero -->
      <div
        class="
          mt-[-32px]

          min-[390px]:mt-[-24px]

          min-[412px]:mt-[-16px]
        "
      >

        <img
          src="/images/onboarding/1/BG.png"
          alt="Onboarding Hero"
          class="
            w-[312px]
            object-contain

            min-[390px]:w-[320px]

            min-[412px]:w-[340px]
          "
        >

      </div>

      <!-- Title -->
      <div
        class="
          mt-[-32px]
          text-center
          leading-tight
        "
      >

        <h1
          class="
            text-[24px]

            min-[390px]:text-[30px]
            min-[412px]:text-[32px]

            font-bold
            text-white
          "
        >
          Musik adalah
        </h1>

        <h1
          class="
            text-[24px]

            min-[390px]:text-[28px]
            min-[412px]:text-[32px]
            font-bold
            text-[#7C3AED]
          "
        >
          bagian dari dirimu.
        </h1>

      </div>

      <!-- Description -->
      <div
        class="
          mt-[16px]
          px-[32px]
          text-center
        "
      >

        <p
          class="
            text-[16px]
            font-normal
            leading-[24px]
            text-[#A1A1AA]
          "
        >
          NARA membantumu mengenal
          identitas musikmu dan terhubung
          dengan orang yang tepat.
        </p>

      </div>

      <!-- Pagination -->
      <div
        class="
          mt-[48px]
          mb-[32px]
          flex
          items-center
          gap-[10px]
        "
      >

        <div
          class="
            h-[10px]
            w-[10px]
            rounded-full
            bg-white
          "
        ></div>

        <div
          class="
            h-[10px]
            w-[10px]
            rounded-full
            bg-[#A1A1AA]
          "
        ></div>

      </div>

      <!-- Push ke bawah-->
       <div class="flex-1"></div>

      <!-- Button -->
      <button
        class="
          mb-[48px]
          h-[53px]
          w-full
          max-w-[328px]
          rounded-[16px]
          bg-[#7C3AED]
          text-[16px]
          font-semibold
          text-white

          transition-all
          duration-300

          hover:bg-[#8B5CF6]
          active:scale-[0.98]
        "
      >
        Lanjut
      </button>

    </section>

  </main>

</body>

</html>
