<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NARA Music</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

</head>

<body
  class="
    bg-[#09090B]
    overflow-hidden
    font-['Inter']
  "
>

  <main
    class="
      relative
      h-dvh
      overflow-hidden
      bg-[#09090B]
    "
  >

    <section
      class="
        flex
        h-full
        flex-col
        items-center
      "
    >

      <!-- Title -->

      <div
        class="
          mt-[32px]
          text-center
          leading-tight
          "
      >

      <h1
        class="
          text-[24px]
          min-[390px]:text-[30px]
          min-[412px]:text-[32px]
          font-bold
          text-white
          "
      >
        Kenali dirimu  
        </h1>

      <h1
        class="
          text-[24px]
          min-[390px]:text-[30px]
          min-[412px]:text-[32px]
          font-bold
          text-white
          "
      >
        Temukan yang
        </h1>

        <h1
        class="
          text-[24px]
          min-[390px]:text-[30px]
          min-[412px]:text-[32px]
          font-bold
          text-[#7C3AED]
          "
      >
        mirip denganmu.  
        </h1>

      </div>
        

      <!-- Features -->

      <div
        class="
          mt-[24px]
          w-full
          max-w-[328px]

          space-y-[12px]

          min-[390px]:space-y-[16px]
          min-[412px]:space-y-[18px]
        "
      >

      <!-- CARD 1 -->

        <img
          src="/images/onboarding/2/badge-1.png"
          alt="Onboarding Hero"
          class="
            w-full
            object-contain
          "
        >

      <!-- CARD 2 -->

        <img
          src="/images/onboarding/2/badge-2.png"
          alt="Onboarding Hero"
          class="
            w-full
            object-contain
          "
        >

        <!-- CARD 3 -->

        <img
          src="/images/onboarding/2/badge-3.png"
          alt="Onboarding Hero"
          class="
            w-full
            object-contain
          "
        >

      </div>

      <!-- Title -->

      <!-- Description -->

      
      <!-- Push ke bawah-->
       <div class="flex-1"></div>

      <!-- Pagination -->
      <div
        class="
          mt-[48px]
          mb-[32px]
          flex
          items-center
          gap-[10px]
        "
      >

        <div
          class="
            h-[10px]
            w-[10px]
            rounded-full
            bg-white
          "
        ></div>

        <div
          class="
            h-[10px]
            w-[10px]
            rounded-full
            bg-[#A1A1AA]
          "
        ></div>

      </div>

      <!-- Button -->
      <button
        class="
          mb-[32px]
          h-[53px]
          w-full
          max-w-[328px]
          rounded-[16px]
          bg-[#7C3AED]
          text-[16px]
          font-semibold
          text-white

          transition-all
          duration-300

          hover:bg-[#8B5CF6]
          active:scale-[0.98]
        "
      >
        Mulai
      </button>

    </section>

  </main>

</body>

</html>
