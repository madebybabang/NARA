<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NARA - Onboarding 2</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

</head>

<body
  class="
    bg-[#09090B]
    font-['Inter']
    overflow-hidden
  "
>

  <main
    class="
      h-dvh
      overflow-hidden
      bg-[#09090B]
    "
  >

    <section
      class="
        flex
        h-full
        flex-col
        items-center
        px-4
        min-[390px]:px-5
        min-[412px]:px-6
      "
    >

      <!-- Title -->

      <div
        class="
          mt-[24px]
          min-[390px]:mt-8
          min-[412px]:mt-10
          text-center
          leading-tight
        "
      >

        <h1
          class="
            text-[24px]
            min-[390px]:text-[28px]
            min-[412px]:text-[30px]
            font-bold
            text-white
          "
        >
          Kenali dirimu.
        </h1>

        <h1
          class="
            text-[24px]
            min-[390px]:text-[28px]
            min-[412px]:text-[30px]
            font-bold
            text-white
          "
        >
          Temukan yang
        </h1>

        <h1
          class="
            text-[24px]
            min-[390px]:text-[28px]
            min-[412px]:text-[30px]
            font-bold
            text-[#7C3AED]
          "
        >
          mirip denganmu.
        </h1>

      </div>

      <!-- Features -->

      <div
        class="
          mt-[24px]
          min-[390px]:mt-8
          w-full
          max-w-[328px]
          min-[390px]:max-w-[340px]
          min-[412px]:max-w-[360px]
          space-y-[16px]
        "
      >

        <!-- Card 1 -->

        <div
          class="
            flex
            items-center
            gap-[12px]
            min-[390px]:gap-4
            h-[112px]
            min-[390px]:h-[118px]
            min-[412px]:h-[124px]
            rounded-[16px]
            border-[1px]
            border-[#7C3AED]
            bg-[#18181B]
            px-4
          "
        >

          <div
            class="
              flex
              h-[80px]
              w-[80px]

              min-[390px]:h-[84px]
              min-[390px]:w-[84px]

              min-[412px]:h-[88px]
              min-[412px]:w-[88px]

              shrink-0

              items-center
              justify-center

              rounded-full
              border
              border-[#7C3AED]
            "
          >

            <img
              src="/images/onboarding/2/icons/personality.png"
              alt="Music Personality"
              class="
                h-[80px]
                w-[80px]
                object-contain
              "
            >

          </div>

          <div class="flex-1">

            <h3
              class="
                text-[18px]
                min-[390px]:text-[19px]
                min-[412px]:text-[20px]
                font-bold
                text-white
              "
            >
              Music Personality
            </h3>

            <p
              class="
                mt-1
                text-[14px]
                min-[390px]:text-[15px]
                leading-[20px]
                text-[#A1A1AA]
              "
            >
              kami menganalisis preferensi
              musikmu untuk menemukan
              identitas musikmu.
            </p>

          </div>

        </div>

        <!-- Card 2 -->

        <div
          class="
            flex
            items-center
            gap-[12px]
            min-[390px]:gap-4
            h-[112px]
            min-[390px]:h-[118px]
            min-[412px]:h-[124px]
            rounded-[16px]
            border-[1px]
            border-[#7C3AED]

            bg-[#18181B]

            px-4
          "
        >

          <div
            class="
              flex
              h-[80px]
              w-[80px]

              min-[390px]:h-[84px]
              min-[390px]:w-[84px]

              min-[412px]:h-[88px]
              min-[412px]:w-[88px]

              shrink-0

              items-center
              justify-center

              rounded-full
              border
              border-[#7C3AED]
            "
          >

            <img
              src="/images/onboarding/2/icons/match.png"
              alt="Music Match"
              class="
                h-[80px]
                w-[80px]
                object-contain
              "
            >

          </div>

          <div class="flex-1">

            <h3
              class="
                text-[18px]
                min-[390px]:text-[19px]
                min-[412px]:text-[20px]
                font-bold
                text-white
              "
            >
              Music Match
            </h3>

            <p
              class="
                mt-1
                text-[14px]
                min-[390px]:text-[15px]
                leading-[20px]
                text-[#A1A1AA]
              "
            >
              Temukan orang yang selera
              musiknya mirip denganmu
              hingga 95%.
            </p>

          </div>

        </div>

        <!-- Card 3 -->

        <div
          class="
            flex
            items-center
            gap-[12px]
            min-[390px]:gap-4
            h-[112px]
            min-[390px]:h-[118px]
            min-[412px]:h-[124px]
            rounded-[16px]
            border-[1px]
            border-[#7C3AED]

            bg-[#18181B]

            px-4
          "
        >

          <div
            class="
              flex
              h-[80px]
              w-[80px]

              min-[390px]:h-[84px]
              min-[390px]:w-[84px]

              min-[412px]:h-[88px]
              min-[412px]:w-[88px]

              shrink-0

              items-center
              justify-center

              rounded-full
              border
              border-[#7C3AED]
            "
          >

            <img
              src="/images/onboarding/2/icons/community.png"
              alt="Music Community"
              class="
                h-[80px]
                w-[80px]
                scale-[0.9]
                object-contain
              "
            >

          </div>

          <div class="flex-1">

            <h3
              class="
                text-[18px]
                min-[390px]:text-[19px]
                min-[412px]:text-[20px]
                font-bold
                text-white
              "
            >
              Music Community
            </h3>

            <p
              class="
                mt-1
                text-[14px]
                min-[390px]:text-[15px]
                leading-[20px]
                text-[#A1A1AA]
              "
            >
              Gabung komunitas, berbagi
              cerita, dan tumbuh bersama
              lewat musik.
            </p>

          </div>

        </div>

      </div>

      <!-- Pagination -->

      <div
        class="
          mt-6

        min-[390px]:mt-8
          flex
          items-center
          gap-[10px]
        "
      >

        <div
          class="
            h-[10px]
            w-[10px]
            rounded-full
            bg-white
          "
        ></div>

        <div
          class="
            h-[10px]
            w-[10px]
            rounded-full
            bg-[#A1A1AA]
          "
        ></div>

      </div>

      <!-- Spacer -->

      <div class="flex-1"></div>

      <!-- Button -->

      <button
        class="
          mb-[32px]
          min-[390px]:mb-10
          min-[412px]:mb-12

          h-[53px]
          min-[390px]:h-[56px]
          
          w-full

          max-w-[328px]
          min-[390px]:max-w-[340px]
          min-[412px]:max-w-[360px]
          rounded-[16px]

          bg-[#7C3AED]

          text-[16px]
          font-semibold
          text-white

          transition-all
          duration-300

          hover:bg-[#8B5CF6]
          active:scale-[0.98]
        "
      >
        Mulai
      </button>

    </section>

  </main>

</body>

</html>
