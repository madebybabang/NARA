<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NARA Music</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
    rel="stylesheet"
  >

  <!-- Styles -->
  <link
    rel="stylesheet"
    href="../styles/global.css"
  >

  <link
    rel="stylesheet"
    href="../styles/variables.css"
  >

  <link
    rel="stylesheet"
    href="../styles/animations.css"
  >

</head>

<body class="font-['Inter']">

  <main
    id="app"
    class="
      flex
      items-center
      justify-center
      w-screen
      h-screen
      overflow-hidden
      bg-white
      transition-all
      duration-700
    "
  >

    <!-- iPhone Frame -->
    <section
      class="
        relative
        w-[390px]
        h-[844px]
        overflow-hidden
        rounded-[55px]
        border-[10px]
        border-black
        bg-[#050505]
        shadow-2xl
      "
    >

      <!-- Status Bar -->
      <header
        class="
          absolute
          top-[18px]
          left-0
          z-40
          flex
          items-center
          justify-between
          w-full
          px-[28px]
          text-white
        "
      >

        <span
          class="
            text-[15px]
            font-semibold
          "
        >
          9:41
        </span>

        <div
          class="
            flex
            items-center
            gap-[6px]
          "
        >

          <img
            src="/icons/signal.svg"
            alt="Signal"
            class="h-[12px]"
          >

          <img
            src="/icons/wifi.svg"
            alt="WiFi"
            class="h-[12px]"
          >

          <img
            src="/icons/battery.svg"
            alt="Battery"
            class="h-[12px]"
          >

        </div>

      </header>

      <!-- Dynamic Island -->
      <div
        class="
          absolute
          top-[12px]
          left-1/2
          z-50
          w-[120px]
          h-[35px]
          rounded-full
          bg-black
          -translate-x-1/2
        "
      ></div>

      <!-- Skip -->
      <button
        id="skipButton"
        class="
          absolute
          top-[85px]
          right-[30px]
          z-30
          text-[16px]
          font-medium
          text-[#A1A1AA]
          transition-colors
          duration-200
          active:text-[#EDE9FE]
        "
      >
        Lewati
      </button>

      <!-- Heading -->
      <section
        class="
          absolute
          top-[110px]
          left-[16px]
          z-20
          text-white
        "
      >

        <h1
          class="
            text-[32px]
            font-bold
          "
        >
          Playlist sesuai
        </h1>

        <h1
          class="
            text-[32px]
            font-bold
          "
        >
          selera kamu
        </h1>

      </section>

      <!-- Description -->
      <section
        class="
          absolute
          top-[240px]
          left-[16px]
          z-20
          text-white
        "
      >

        <p
          class="
            text-[20px]
          "
        >
          Buat playlist favoritmu,
        </p>

        <p
          class="
            text-[20px]
          "
        >
          simpan, dan dengarkan
        </p>

        <p
          class="
            text-[20px]
          "
        >
          kapan saja.
        </p>

      </section>

      <!-- Hero -->
      <div
        class="
          absolute
          top-[320px]
          left-1/2
          z-10
          w-[390px]
          h-[422px]
          max-w-none
          -translate-x-1/2
        "
      >

        <img
          src="/images/onboarding/2/dark-mode.png"
          alt="Playlist Preview"
          class="
            w-full
            object-contain
            scale-110
          "
        >

      </div>

      <!-- Pagination -->
      <div
        class="
          absolute
          bottom-[140px]
          left-1/2
          z-20
          flex
          items-center
          gap-[12px]
          -translate-x-1/2
        "
      >

        <div
          class="
            w-[10px]
            h-[10px]
            rounded-full
            bg-[#A1A1AA]
          "
        ></div>

        <div
          class="
            w-[10px]
            h-[10px]
            rounded-full
            bg-white
          "
        ></div>

      </div>

      <!-- Button -->
      <button
        id="nextButton"
        class="
          absolute
          bottom-[55px]
          left-1/2
          z-20
          flex
          items-center
          justify-center
          w-[358px]
          h-[56px]
          rounded-[16px]
          bg-[#7C3AED]
          text-white
          text-[16px]
          font-semibold
          -translate-x-1/2
          transition-all
          duration-300
          hover:bg-[#8B5CF6]
          active:bg-[#6D28D9]
          active:scale-[0.98]
          hover:scale-[1.02]
        "
      >
        Lanjut
      </button>

      <!-- Home Indicator -->
      <div
        class="
          absolute
          bottom-[10px]
          left-1/2
          z-30
          w-[148px]
          h-[5px]
          rounded-full
          bg-white
          -translate-x-1/2
        "
      ></div>

    </section>

  </main>

  <script>

  </script>

</body>

</html>
