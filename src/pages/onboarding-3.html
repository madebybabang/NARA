<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NARA - Sign In</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

</head>

<body
  class="
    overflow-hidden
    bg-[#09090B]
    font-['Inter']
  "
>

  <main
    class="
      h-dvh
      overflow-hidden
      bg-[#09090B]
    "
  >

    <section
      class="
        flex
        h-full
        flex-col

        px-4

        min-[390px]:px-5
        min-[412px]:px-6
      "
    >

      <!-- Header -->

      <div
        class="
          mt-[4px]

          min-[390px]:mt-12
        "
      >

        <h1
          class="
            text-[24px]

            min-[390px]:text-[26px]

            font-bold
            text-white
            leading-tight
          "
        >
          Selamat Datang Kembali
        </h1>

        <p
          class="
            mt-[12px]

            text-[16px]
            font-medium

            text-[#A1A1AA]
          "
        >
          Yuk, Lanjut dengan musik favoritmu!
        </p>

      </div>

      <!-- Form -->

      <div
        class="
          mt-[48px]

          w-full

          max-w-[328px]

          min-[390px]:max-w-[340px]

          min-[412px]:max-w-[360px]
        "
      >

        <!-- Email -->

        <label
          class="
            text-[16px]
            font-medium
            text-white
          "
        >
          Email atau Username
        </label>

        <input
          type="text"
          placeholder="contoh@email.com"
          class="
            mt-2

            h-[56px]
            w-full

            rounded-[12px]

            border
            border-[#2A2A3A]

            bg-[#14141E]

            px-5

            text-white

            outline-none

            placeholder:text-[#71717A]
          "
        >

        <!-- Password -->

        <div class="mt-[12px]">

          <label
            class="
              text-[16px]
              font-medium
              text-white
            "
          >
            Kata Sandi
          </label>

          <div class="relative mt-2">

            <input
              type="password"
              placeholder="**********"
              class="
                h-[56px]
                w-full

                rounded-[12px]

                border
                border-[#2A2A3A]

                bg-[#14141E]

                px-5
                pr-14

                text-white

                outline-none

                placeholder:text-[#71717A]
              "
            >

            <button
              type="button"
              class="
                absolute
                right-5
                top-1/2
                -translate-y-1/2

                text-[#A1A1AA]
              "
            >

              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                />
              </svg>

            </button>

          </div>

        </div>

        <!-- Forgot Password -->

        <div
          class="
            mt-[8px]
            flex
            justify-end
          "
        >

          <a
            href="#"
            class="
              text-[16px]
        font-medium
              text-[#7C3AED]
            "
          >
            Lupa kata sandi?
          </a>

        </div>

        <!-- Login -->

        <button
          class="
            mt-[32px]

            h-[56px]
            w-full

            rounded-[16px]

            bg-[#7C3AED]

            text-[16px]
            font-semibold
            text-white

            transition-all
            duration-300

            active:scale-[0.98]
          "
        >
          Masuk
        </button>

        <!-- Divider -->

        <p
          class="
            mt-[32px]

            text-center

            text-[16px]
            font-normal
            text-[#A1A1AA]
          "
        >
          atau masuk dengan
        </p>

        <!-- Google -->

        <button
          class="
            mt-[32px]

            flex
            h-[56px]
            w-full

            items-center
            justify-center

            gap-4

            rounded-[16px]

            border
            border-[#27272A]

            bg-[#11111B]

            text-[16px]
            font-semibold
            text-white
          "
        >

          <img
            src="/images/onboarding/3/google-icon.svg"
            alt="Google"
            class="h-7 w-7"
          >

          <span>
            Lanjutkan dengan Google
          </span>

        </button>

        <!-- Facebook -->

        <button
          class="
            mt-[12px]

            flex
            h-[56px]
            w-full

            items-center
            justify-center

            gap-4

            rounded-[16px]

            border
            border-[#27272A]

            bg-[#11111B]

            text-[16px]
            font-semibold
            text-white
          "
        >

          <img
            src="/images/onboarding/3/facebook-icon.svg"
            alt="Facebook"
            class="h-7 w-7"
          >

          <span>
            Lanjutkan dengan Facebook
          </span>

        </button>

      </div>

      <!-- Spacer -->

      <div class="flex-1"></div>

      <!-- Register -->

      <div
        class="
          mb-8

          text-center

          text-[16px]

          text-[#A1A1AA]
        "
      >

        Belum punya akun?

        <a
          href="#"
          class="
            font-semibold
            text-[#7C3AED]
          "
        >
          Daftar
        </a>

      </div>

    </section>

  </main>

</body>

</html>
